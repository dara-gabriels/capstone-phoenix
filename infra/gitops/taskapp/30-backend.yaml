apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: taskapp
  labels:
    app: taskapp
    tier: backend
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # zero dropped requests during a rollout
  selector:
    matchLabels:
      app: taskapp
      tier: backend
  template:
    metadata:
      labels:
        app: taskapp
        tier: backend
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: taskapp
              tier: backend
      containers:
        - name: backend-engine
          image: ghcr.io/ts-a-devops/taskapp-backend:c2b906d   # pinned to commit SHA, never :latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: taskapp-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: taskapp-secrets
                  key: DATABASE_URL
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          startupProbe:
            httpGet:
              path: /api/health
              port: 5000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: taskapp
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: taskapp
    tier: backend

---
# Advanced requirement: HPA on the backend (needs metrics-server, installed
# by the k3s_platform Ansible role).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: taskapp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

---
# Advanced requirement: PDB so a node drain (or the live failover demo)
# can't take out every backend replica at once.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: taskapp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: taskapp
      tier: backend
