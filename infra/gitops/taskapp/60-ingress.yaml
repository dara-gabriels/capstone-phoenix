apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: taskapp
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - http://taskapp.taskjob.name.ng/   # your real domain (app_domain)
      secretName: taskapp-tls
  rules:
    - host: http://taskapp.taskjob.name.ng/  # your real domain (app_domain)
      http:
        paths:
          # Same-origin API: /api/* goes to the backend, everything else to
          # the frontend. Chosen over a separate api.<domain> host so the
          # SPA never has to deal with cross-origin cookies/CORS - one
          # cert, one host, path-based routing.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
